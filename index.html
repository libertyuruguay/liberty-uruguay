<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Liberty Cupos Aéreos</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#eef2f7;
}

/* HEADER */
.header{
background:#0b3a6f;
padding:20px;
color:white;
font-size:22px;
font-weight:600;
}

/* BUSCADOR */
.search-box{
background:white;
margin:-30px auto 20px;
width:90%;
max-width:1100px;
padding:20px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
display:flex;
gap:10px;
flex-wrap:wrap;
}

.search-box input{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
}

.search-box button{
padding:12px 20px;
background:#0b3a6f;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* CONTROLES */
.controls{
width:90%;
max-width:1100px;
margin:0 auto;
display:flex;
justify-content:flex-end;
padding:10px;
}

.controls select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

/* RESULTADOS */
.results{
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

/* CARD */
.card{
background:white;
border-radius:14px;
padding:18px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
transition:0.3s;
}

.card:hover{
transform:translateY(-3px);
box-shadow:0 12px 30px rgba(0,0,0,0.12);
}

.left{
flex:1;
}

.flight-row{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:12px;
}

.route{
font-weight:600;
font-size:16px;
}

.time{
font-size:14px;
color:#666;
}

.airline{
font-size:12px;
color:#999;
display:flex;
align-items:center;
gap:6px;
}

.airline img{
height:16px;
}

.line{
flex:1;
height:1px;
background:#ddd;
margin:0 10px;
position:relative;
}

.line::after{
content:"✈";
position:absolute;
top:-8px;
left:50%;
transform:translateX(-50%);
font-size:14px;
color:#0b3a6f;
}

/* DERECHA */
.right{
text-align:right;
min-width:160px;
}

.price{
font-size:28px;
font-weight:700;
color:#0b3a6f;
}

.badges{
margin-top:6px;
}

.badges span{
font-size:11px;
padding:5px 8px;
border-radius:6px;
margin-left:5px;
}

.low{background:#ff4d4d;color:white;}
.medium{background:#ffa500;color:white;}
.high{background:#28a745;color:white;}

.urgency{
background:#ff4d4d;
color:white;
font-size:11px;
padding:4px 8px;
border-radius:6px;
display:inline-block;
margin-top:5px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:0.6;}
100%{opacity:1;}
}

.btn{
margin-top:10px;
display:inline-block;
background:#0b3a6f;
color:white;
padding:9px 14px;
border-radius:8px;
text-decoration:none;
font-size:13px;
}

/* RESPONSIVE */
@media(max-width:768px){
.card{
flex-direction:column;
align-items:flex-start;
}

.right{
width:100%;
text-align:left;
}
}
</style>
</head>

<body>

<div class="header">✈️ Liberty Cupos Aéreos</div>

<div class="search-box">
<input id="origen" placeholder="Origen">
<input id="destino" placeholder="Destino">
<button onclick="buscar()">Buscar</button>
</div>

<div class="controls">
<select onchange="ordenar(this.value)">
<option value="">Ordenar</option>
<option value="precio">Precio menor</option>
</select>
</div>

<div class="results" id="resultados"></div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv";

let data = [];

fetch(url)
.then(res => res.text())
.then(text => {
let rows = text.split("\n").slice(1);
data = rows.map(r => r.split(","));
mostrar(data);
});

function getLogo(name){
name = name.toLowerCase();
if(name.includes("latam")) return "https://upload.wikimedia.org/wikipedia/commons/1/1b/LATAM_logo.svg";
if(name.includes("gol")) return "https://upload.wikimedia.org/wikipedia/commons/2/2b/GOL_Logo.svg";
return "";
}

function cupoColor(c){
c = parseInt(c);
if(c <= 3) return "low";
if(c <= 7) return "medium";
return "high";
}

function buscar(){
let o = document.getElementById("origen").value.toLowerCase();
let d = document.getElementById("destino").value.toLowerCase();

let filtrados = data.filter(r =>
r[1].toLowerCase().includes(o) &&
r[2].toLowerCase().includes(d)
);

mostrar(filtrados);
}

function ordenar(tipo){
if(tipo === "precio"){
data.sort((a,b)=>parseFloat(a[14]) - parseFloat(b[14]));
}
mostrar(data);
}

function mostrar(datos){

let html = "";

datos.forEach(r => {

let cupos = parseInt(r[13]);
let urgencia = cupos <= 3 ? `<div class="urgency">Últimos cupos</div>` : "";

let logoIda = getLogo(r[3]);
let logoVuelta = getLogo(r[9]);

let wa = `https://wa.me/59800000000?text=${encodeURIComponent(
`Consulta ${r[1]}-${r[2]} ${r[4]}`
)}`;

html += `
<div class="card">

<div class="left">

<div class="flight-row">
<div>
<div class="route">${r[1]} → ${r[2]}</div>
<div class="time">${r[5]} - ${r[6]}</div>
<div class="airline">
${logoIda ? `<img src="${logoIda}">` : ""} ${r[3]}
</div>
</div>
<div class="line"></div>
<div>${r[0]}</div>
</div>

<div class="flight-row">
<div>
<div class="route">${r[2]} → ${r[1]}</div>
<div class="time">${r[11]} - ${r[12]}</div>
<div class="airline">
${logoVuelta ? `<img src="${logoVuelta}">` : ""} ${r[9]}
</div>
</div>
<div class="line"></div>
<div>${r[0]}</div>
</div>

</div>

<div class="right">
<div class="price">USD ${r[14]}</div>

<div class="badges">
<span class="${cupoColor(r[13])}">${r[13]} cupos</span>
<span>${r[15]}</span>
</div>

${urgencia}

<a class="btn" href="${wa}" target="_blank">Consultar</a>
</div>

</div>
`;

});

document.getElementById("resultados").innerHTML = html;

}

</script>

</body>
</html>
