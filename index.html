<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Cupos Liberty</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f3f5f9;
margin:0;
}

/* HEADER */
header{
background:white;
border-bottom:1px solid #e6e8ec;
padding:15px;
}

.headerbox{
display:flex;
align-items:center;
justify-content:space-between;
max-width:1200px;
margin:auto;
}

.headerbox img{height:45px;}

.headerbox span{
font-size:18px;
font-weight:600;
color:#0b3a6f;
}

/* CONTAINER */
.container{
max-width:1200px;
margin:auto;
padding:30px 20px;
}

/* CARD */
.card{
background:white;
border-radius:14px;
margin-bottom:20px;
box-shadow:0 4px 20px rgba(0,0,0,0.06);
padding:25px;
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr 250px;
gap:25px;
align-items:center;
}

/* BLOQUES */
.box{
border-right:1px solid #eee;
padding-right:20px;
}

.box:last-child{
border:none;
}

/* TITULOS */
.title{
font-size:12px;
color:#9aa1ac;
margin-bottom:10px;
font-weight:500;
letter-spacing:.5px;
}

/* TIMES */
.times{
display:flex;
justify-content:space-between;
align-items:center;
}

.time{
font-size:24px;
font-weight:700;
color:#1c1e21;
}

.city{
font-size:13px;
color:#6b7280;
}

.center{text-align:center;}

.duration{
font-size:12px;
color:#6b7280;
margin:6px 0;
}

/* LINEA */
.line{
height:2px;
background:#d1d5db;
position:relative;
border-radius:2px;
}

.dot{
width:8px;
height:8px;
background:#0b3a6f;
border-radius:50%;
position:absolute;
top:-3px;
}

.dot.start{left:0;}
.dot.end{right:0;}
.dot.middle{left:50%;transform:translateX(-50%);}

/* OPERADO */
.operado{
font-size:12px;
color:#9aa1ac;
margin-top:10px;
}

/* BOTON DETALLES */
.details{
margin-top:12px;
display:inline-block;
font-size:12px;
color:#0b3a6f;
cursor:pointer;
font-weight:500;
}

/* RIGHT */
.right{
text-align:right;
}

.price{
font-size:30px;
font-weight:700;
color:#111827;
}

.subinfo{
font-size:13px;
color:#6b7280;
margin-top:5px;
}

.btn{
margin-top:15px;
background:#0b3a6f;
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
width:100%;
font-weight:600;
transition:.2s;
}

.btn:hover{
background:#092c52;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
width:500px;
padding:25px;
border-radius:12px;
}

</style>
</head>

<body>

<header>
<div class="headerbox">
<img src="Liberty-01.png">
<span>Cupos Aéreos</span>
</div>
</header>

<div class="container" id="cards"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<h3>Detalles del vuelo</h3>
<div id="detalle"></div>
<br>
<button onclick="cerrarModal()">Cerrar</button>
</div>
</div>

<script>

const CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

fetch(CSV)
.then(r=>r.text())
.then(data=>{

let rows=data.split("\n").slice(2).map(r=>r.split(","))

for(let i=0;i<rows.length;i+=2){
crearCard(rows[i], rows[i+1])
}

})

function calcularDuracion(salida,llegada){

let [h1,m1]=salida.split(":").map(Number)
let [h2,m2]=llegada.split(":").map(Number)

let ini=h1*60+m1
let fin=h2*60+m2
if(fin<ini) fin+=1440

let t=fin-ini
return `${Math.floor(t/60)}h ${t%60}m`
}

function crearCard(ida, regreso){

let escalaI = ida[0]=="SI"
let escalaR = regreso[0]=="SI"

let card=`
<div class="card">

<div class="grid">

<!-- IDA -->
<div class="box">

<div class="title">IDA</div>

<div class="times">
<div>
<div class="time">${ida[5]}</div>
<div class="city">${ida[1]}</div>
</div>

<div class="center">
<div class="duration">${calcularDuracion(ida[5], escalaI?ida[12]:ida[6])}</div>
<div class="line">
<div class="dot start"></div>
${escalaI?'<div class="dot middle"></div>':''}
<div class="dot end"></div>
</div>
</div>

<div style="text-align:right">
<div class="time">${escalaI?ida[12]:ida[6]}</div>
<div class="city">${ida[2]}</div>
</div>
</div>

<div class="operado">${ida[3]}</div>

<div class="details" onclick='verDetalle(${JSON.stringify(ida)})'>
Ver detalles
</div>

</div>

<!-- REGRESO -->
<div class="box">

<div class="title">REGRESO</div>

<div class="times">
<div>
<div class="time">${regreso[5]}</div>
<div class="city">${regreso[1]}</div>
</div>

<div class="center">
<div class="duration">${calcularDuracion(regreso[5], escalaR?regreso[12]:regreso[6])}</div>
<div class="line">
<div class="dot start"></div>
${escalaR?'<div class="dot middle"></div>':''}
<div class="dot end"></div>
</div>
</div>

<div style="text-align:right">
<div class="time">${escalaR?regreso[12]:regreso[6]}</div>
<div class="city">${regreso[2]}</div>
</div>
</div>

<div class="operado">${regreso[3]}</div>

<div class="details" onclick='verDetalle(${JSON.stringify(regreso)})'>
Ver detalles
</div>

</div>

<!-- PRECIO -->
<div class="right">
<div class="price">${ida[14]} USD</div>
<div class="subinfo">${ida[13]} cupos</div>
<div class="subinfo">${ida[15]}</div>

<button class="btn" onclick="consultar('${ida[1]}-${ida[2]}')">
Consultar
</button>
</div>

</div>

</div>
`

document.getElementById("cards").innerHTML+=card

}

function verDetalle(data){

let html = `
<b>Salida:</b> ${data[1]} ${data[5]}<br>
<b>Llegada:</b> ${data[2]} ${data[6]}<br>
<b>Aerolínea:</b> ${data[3]}
`

document.getElementById("detalle").innerHTML = html
document.getElementById("modal").style.display="flex"
}

function cerrarModal(){
document.getElementById("modal").style.display="none"
}

function consultar(ruta){
window.location.href=`mailto:jose@libertyuruguay.com.uy?subject=Consulta vuelo ${ruta}`
}

</script>

</body>
</html>
