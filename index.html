<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Promos Aéreas Liberty</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f4f6fb;
margin:0;
padding:20px;
}

/* buscador */
.search-box{
max-width:900px;
margin:0 auto 20px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

/* tabla ultra compacta */
.row{
display:grid;
grid-template-columns: 1.2fr 1fr 1fr 1fr 1fr 0.8fr 1fr 0.6fr;
gap:8px;
align-items:center;
background:white;
padding:8px 10px;
border-radius:8px;
margin-bottom:6px;
font-size:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
transition:0.2s;
}

.row:hover{
background:#f7f9fc;
}

.col{
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.route{font-weight:600;}

.price{
font-size:16px;
font-weight:700;
color:#0b3a6f;
}

/* cupos */
.low{color:#ff4d4d;font-weight:600;}
.medium{color:#ffa500;}
.high{color:#28a745;}

.urgency{
background:#ff4d4d;
color:white;
font-size:9px;
padding:2px 4px;
border-radius:4px;
margin-left:4px;
}

/* botón */
.btn{
background:#0b3a6f;
color:white;
padding:4px 6px;
border-radius:5px;
font-size:11px;
text-decoration:none;
}

/* encabezado */
.header{
display:grid;
grid-template-columns: 1.2fr 1fr 1fr 1fr 1fr 0.8fr 1fr 0.6fr;
gap:8px;
font-size:11px;
color:#777;
margin-bottom:8px;
padding:0 10px;
}

/* responsive */
@media(max-width:768px){
.row,.header{
grid-template-columns: 1fr 1fr 1fr;
font-size:11px;
}
}

</style>
</head>

<body>

<div class="search-box">
<input type="text" id="buscador" placeholder="Buscar destino, origen o compañía...">
</div>

<div class="header">
<div>Ruta</div>
<div>Ida</div>
<div>Aerolínea</div>
<div>Vuelta</div>
<div>Equipaje</div>
<div>Cupos</div>
<div>Precio</div>
<div></div>
</div>

<div id="resultados"></div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv";

let data = [];

fetch(url)
.then(res => res.text())
.then(csv => {
let rows = csv.split("\n").map(r => r.split(","));
data = rows.slice(1);
mostrar(data);
});

/* buscador */
document.getElementById("buscador").addEventListener("input", e => {
let val = e.target.value.toLowerCase();
let filtrado = data.filter(r =>
r.join(" ").toLowerCase().includes(val)
);
mostrar(filtrado);
});

/* color cupos */
function cupoColor(c){
c = parseInt(c);
if(c <= 3) return "low";
if(c <= 7) return "medium";
return "high";
}

/* render */
function mostrar(datos){

let html = "";

datos.forEach(r => {

if(r.length < 16) return;

let cupos = parseInt(r[13]);
let color = cupoColor(r[13]);
let urgencia = cupos <= 3 ? `<span class="urgency">Últimos</span>` : "";

let wa = `https://wa.me/59800000000?text=${encodeURIComponent(
`Consulta vuelo ${r[1]}-${r[2]} ${r[4]} USD ${r[14]}`
)}`;

html += `
<div class="row">

<div class="col route">
${r[1]} → ${r[2]}
</div>

<div class="col time">
✈ ${r[5]}-${r[6]}
</div>

<div class="col airline">
${r[3]}
</div>

<div class="col return">
↩ ${r[11]}-${r[12]}
</div>

<div class="col baggage">
${r[15]}
</div>

<div class="col cupos ${color}">
${r[13]} ${urgencia}
</div>

<div class="col price">
USD ${r[14]}
</div>

<div class="col">
<a class="btn" href="${wa}" target="_blank">OK</a>
</div>

</div>
`;

});

document.getElementById("resultados").innerHTML = html;

}

</script>

</body>
</html>
