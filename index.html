<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Promos Liberty</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
margin:0;
background:#f5f7fb;
}

header{
background:#0b3a6f;
color:white;
padding:20px;
text-align:center;
font-size:22px;
font-weight:600;
}

.container{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.content{
padding:15px;
}

.title{
font-size:18px;
font-weight:600;
margin-bottom:8px;
}

.info{
font-size:14px;
color:#555;
margin-bottom:10px;
}

.price{
font-size:20px;
font-weight:700;
color:#0b3a6f;
margin-bottom:12px;
}

.btn{
display:block;
text-align:center;
background:#0b3a6f;
color:white;
padding:10px;
border-radius:8px;
text-decoration:none;
font-weight:500;
}
</style>
</head>

<body>

<header>🔥 Promociones Liberty 2026</header>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<div class="content">
<div class="title">Punta Cana</div>
<div class="info">7 noches + vuelos + transfers</div>
<div class="price">USD 1.318</div>
<a class="btn" href="mailto:ventas@liberty.com?subject=Punta Cana Promo">Consultar</a>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
<div class="content">
<div class="title">Buzios</div>
<div class="info">7 noches + desayuno</div>
<div class="price">USD 640</div>
<a class="btn" href="#">Consultar</a>
</div>
</div>

</div>

</body>
</html>
