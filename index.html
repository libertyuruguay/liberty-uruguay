<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Promos Aéreas Liberty</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f4f6fb;
margin:0;
padding:20px;
}

/* buscador */
.search-box{
max-width:900px;
margin:0 auto 20px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

/* contenedor */
.flight{
background:white;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.06);
overflow:hidden;
}

/* filas */
.row{
display:grid;
grid-template-columns: 1.4fr 1fr 1fr 1.2fr 0.8fr 1fr 0.8fr;
gap:8px;
padding:8px 12px;
font-size:12px;
align-items:center;
}

.row.ida{
background:#ffffff;
border-bottom:1px solid #eee;
}

.row.vuelta{
background:#f9fbff;
}

/* columnas */
.route{font-weight:600;}
.time{color:#555;}
.airline{color:#777;}
.scale{color:#999;font-size:11px;}

.price{
font-weight:700;
font-size:16px;
color:#0b3a6f;
}

/* cupos */
.low{color:#ff4d4d;font-weight:600;}
.medium{color:#ffa500;}
.high{color:#28a745;}

.badge{
font-size:10px;
background:#ff4d4d;
color:white;
padding:2px 5px;
border-radius:4px;
margin-left:4px;
}

/* botón */
.btn{
background:#0b3a6f;
color:white;
padding:6px 10px;
border-radius:6px;
font-size:12px;
cursor:pointer;
display:inline-block;
}

.btn:hover{
background:#092c55;
}

</style>
</head>

<body>

<div class="search-box">
<input type="text" id="buscador" placeholder="Buscar destino, origen o compañía...">
</div>

<div id="resultados"></div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv";

let data = [];

fetch(url)
.then(res => res.text())
.then(csv => {
let rows = csv.split("\n").map(r => r.split(","));
data = rows.slice(2).filter(r => r.length >= 16 && r[1]);
mostrar(data);
});

/* buscador */
document.getElementById("buscador").addEventListener("input", e => {
let val = e.target.value.toLowerCase();
let filtrado = data.filter(r =>
r.join(" ").toLowerCase().includes(val)
);
mostrar(filtrado);
});

/* color cupos */
function cupoColor(c){
c = parseInt(c);
if(c <= 3) return "low";
if(c <= 7) return "medium";
return "high";
}

/* mail */
function consultar(ruta, ida, vuelta){

let cupos = prompt("¿Cuántos cupos querés solicitar?");
if(!cupos) return;

let subject = `Consulta ${ruta}`;

let body = `
Ruta: ${ruta}
Cupos solicitados: ${cupos}

IDA:
${ida[1]} → ${ida[2]}
Compañía: ${ida[3]}
Fecha: ${ida[4]}
Horario: ${ida[5]} - ${ida[6]}

VUELTA:
${vuelta[1]} → ${vuelta[2]}
Compañía: ${vuelta[3]}
Fecha: ${vuelta[4]}
Horario: ${vuelta[5]} - ${vuelta[6]}
Escala: ${vuelta[7]} → ${vuelta[8]}

Equipaje: ${ida[15]}
Tarifa: USD ${ida[14]}
`;

window.location.href = `mailto:reservas@tuempresa.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

/* render */
function mostrar(datos){

let html = "";

for(let i=0; i<datos.length; i+=2){

let ida = datos[i];
let vuelta = datos[i+1];

if(!vuelta) continue;

let ruta = `${ida[1]} - ${ida[2]}`;
let color = cupoColor(ida[13]);
let urgencia = ida[13] <= 3 ? `<span class="badge">Últimos</span>` : "";

html += `
<div class="flight">

<div class="row ida">
<div class="route">${ida[1]} → ${ida[2]}</div>
<div class="time">✈ ${ida[5]} - ${ida[6]}</div>
<div class="airline">${ida[3]}</div>
<div></div>
<div class="${color}">${ida[13]} ${urgencia}</div>
<div class="price">USD ${ida[14]}</div>
<div>
<span class="btn" onclick='consultar("${ruta}", ${JSON.stringify(ida)}, ${JSON.stringify(vuelta)})'>Consultar</span>
</div>
</div>

<div class="row vuelta">
<div class="route">${vuelta[1]} → ${vuelta[2]}</div>
<div class="time">↩ ${vuelta[5]} - ${vuelta[6]}</div>
<div class="airline">${vuelta[3]}</div>
<div class="scale">Esc: ${vuelta[7]} → ${vuelta[8]}</div>
<div></div>
<div></div>
<div></div>
</div>

</div>
`;
}

document.getElementById("resultados").innerHTML = html;

}

</script>

</body>
</html>
