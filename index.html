<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Liberty Cupos Aéreos</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#eef2f7;
}

.header{
background:#0b3a6f;
padding:20px;
color:white;
font-size:22px;
font-weight:600;
}

.search-box{
background:white;
margin:-30px auto 20px;
width:90%;
max-width:1100px;
padding:20px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
display:flex;
gap:10px;
}

.search-box input{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
}

.search-box button{
padding:12px 20px;
background:#0b3a6f;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.results{
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.card{
background:white;
border-radius:14px;
padding:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.06);
transition:0.3s;
}

.card:hover{
transform:scale(1.01);
}

/* filas vuelo */
.flight{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #eee;
padding:10px 0;
}

.route{
font-weight:600;
font-size:16px;
}

.time{
font-size:14px;
color:#555;
}

.airline{
font-size:13px;
color:#777;
}

/* precio */
.price-box{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:15px;
}

.price{
font-size:26px;
font-weight:700;
color:#0b3a6f;
}

.badges span{
background:#eee;
padding:6px 10px;
border-radius:6px;
font-size:12px;
margin-right:5px;
}

/* colores cupos */
.low{background:#ff4d4d !important; color:white;}
.medium{background:#ffa500 !important; color:white;}
.high{background:#28a745 !important; color:white;}

.btn{
background:#0b3a6f;
color:white;
padding:10px 15px;
border-radius:8px;
text-decoration:none;
}
</style>
</head>

<body>

<div class="header">✈️ Liberty Cupos Aéreos</div>

<div class="search-box">
<input id="origen" placeholder="Origen">
<input id="destino" placeholder="Destino">
<button onclick="buscar()">Buscar</button>
</div>

<div class="results" id="resultados"></div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv";

let data = [];

fetch(url)
.then(res => res.text())
.then(text => {

let rows = text.split("\n").slice(1);
data = rows.map(r => r.split(","));
mostrar(data);

});

function getLogo(airline){
airline = airline.toLowerCase();

if(airline.includes("latam")) return "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/LATAM_logo.svg/320px-LATAM_logo.svg.png";
if(airline.includes("gol")) return "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/GOL_Logo.svg/320px-GOL_Logo.svg.png";

return "";
}

function cupoColor(cupos){
cupos = parseInt(cupos);
if(cupos <= 3) return "low";
if(cupos <= 7) return "medium";
return "high";
}

function buscar(){

let o = document.getElementById("origen").value.toLowerCase();
let d = document.getElementById("destino").value.toLowerCase();

let filtrados = data.filter(r =>
r[1].toLowerCase().includes(o) &&
r[2].toLowerCase().includes(d)
);

mostrar(filtrados);

}

function mostrar(datos){

let html = "";

datos.forEach(r => {

let logo = getLogo(r[3]);
let color = cupoColor(r[13]);

let wa = `https://wa.me/59800000000?text=${encodeURIComponent(
`Consulta ${r[1]}-${r[2]} ${r[4]}`
)}`;

html += `
<div class="card">

<div class="flight">
<div>
<div class="route">${r[1]} → ${r[0]} → ${r[2]}</div>
<div class="time">${r[5]} - ${r[6]}</div>
<div class="airline">${r[3]}</div>
</div>
<img src="${logo}" height="25">
</div>

<div class="flight">
<div>
<div class="route">${r[2]} → ${r[0]} → ${r[1]}</div>
<div class="time">${r[11]} - ${r[12]}</div>
<div class="airline">${r[9]}</div>
</div>
</div>

<div class="price-box">
<div>
<div class="price">USD ${r[14]}</div>
<div class="badges">
<span class="${color}">Cupos: ${r[13]}</span>
<span>Equipaje: ${r[15]}</span>
</div>
</div>
<a class="btn" href="${wa}" target="_blank">Consultar</a>
</div>

</div>
`;

});

document.getElementById("resultados").innerHTML = html;

}

</script>

</body>
</html>
