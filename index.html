<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cupos Liberty</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
body{font-family:'Inter',sans-serif;background:#f3f5f9;margin:0;}
.container{max-width:1100px;margin:auto;padding:30px 20px;}

.flight{
background:white;border-radius:10px;border:1px solid #e5e7eb;
padding:18px 20px;display:grid;
grid-template-columns:1fr 260px;
align-items:center;margin-bottom:10px;
}

.left{display:flex;align-items:center;justify-content:space-between;gap:15px;}
.airline{width:32px;height:32px;background:#e6f0ff;border-radius:50%;
display:flex;align-items:center;justify-content:center;}

.route{display:flex;align-items:center;gap:12px;flex:1;}
.city{font-size:13px;color:#6b7280;}
.time{font-size:20px;font-weight:600;}
.arrow{color:#9ca3af;}

.middle{text-align:center;min-width:160px;}
.duration,.scale{font-size:13px;color:#6b7280;}

.toggle{cursor:pointer;color:#0ea5e9;font-size:13px;margin-top:5px;}

.right{text-align:right;border-left:1px solid #eee;padding-left:20px;}
.price{font-size:26px;font-weight:700;}

.btn{background:#0ea5e9;color:white;border:none;padding:10px 16px;border-radius:20px;cursor:pointer;}

.detalle{display:none;margin-top:10px;font-size:13px;}
.flight.open .detalle{display:block;}

.segmento{
padding:10px 0;
border-bottom:1px solid #eee;
}
.segmento:last-child{
border-bottom:none;
}
</style>
</head>

<body>

<div class="container" id="cards"></div>

<script>

const CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

// 🔥 LEER CSV Y AGRUPAR POR ID
Papa.parse(CSV, {
  download: true,
  header: true,
  complete: function(results){

    let vuelos = {}

    results.data.forEach(row => {

      if(!row.ID) return

      if(!vuelos[row.ID]){
        vuelos[row.ID] = []
      }

      vuelos[row.ID].push(row)

    })

    Object.values(vuelos).forEach(tramos => {

      tramos.sort((a,b) => Number(a.TRAMO) - Number(b.TRAMO))

      crearCard(tramos)

    })

  }
})

// ⏱ CALCULAR DURACIÓN TOTAL
function calcularDuracion(salida,llegada){
if(!salida || !llegada) return "-"
let [h1,m1]=salida.split(":").map(Number)
let [h2,m2]=llegada.split(":").map(Number)
let ini=h1*60+m1
let fin=h2*60+m2
if(fin<ini) fin+=1440
let t=fin-ini
return `${Math.floor(t/60)}h ${t%60}m`
}

// ✈️ CREAR CARD
function crearCard(tramos){

let id = Math.random().toString(36).substring(7)

let primero = tramos[0]
let ultimo = tramos[tramos.length - 1]

let salida = primero["HORA SALIDA"]
let llegada = ultimo["HORA LLEGADA"]

let card = `
<div class="flight" id="${id}">

<div class="left">

<div class="airline">✈</div>

<div class="route">
<div>
<div class="city">${primero.ORIGEN}</div>
<div class="time">${salida}</div>
</div>

<div class="arrow">→</div>

<div>
<div class="city">${ultimo.DESTINO}</div>
<div class="time">${llegada}</div>
</div>
</div>

<div class="middle">
<div class="duration">${calcularDuracion(salida, llegada)}</div>
<div class="scale">${tramos.length > 1 ? (tramos.length - 1)+' escala' : 'Directo'}</div>

<div class="toggle" onclick="toggleDetalle('${id}')">
Ver detalles ⌄
</div>
</div>

</div>

<div class="right">
<div class="price">${primero.TARIFA} USD</div>
<button class="btn">Seleccionar</button>
</div>

<div class="detalle">
${renderTramos(tramos)}
</div>

</div>
`

document.getElementById("cards").innerHTML += card
}

// 📋 DETALLE DE TRAMOS
function renderTramos(tramos){

let html = ""

tramos.forEach((t, i) => {

  html += `
  <div class="segmento">
    <div><b>${t.COMPAÑIA}</b></div>
    <div>${t.ORIGEN} ${t["HORA SALIDA"]} → ${t.DESTINO} ${t["HORA LLEGADA"]}</div>
    <div style="color:#6b7280;font-size:12px;">${t.FECHA}</div>
    <div style="color:#6b7280;font-size:12px;">Equipaje: ${t.EQUIPAJE}</div>
  </div>
  `

  if(i < tramos.length - 1){
    html += `
    <div style="margin:6px 0;color:#6b7280;">
      Escala en ${t.DESTINO}
    </div>
    `
  }

})

return html
}

// 🔽 TOGGLE
function toggleDetalle(id){
document.getElementById(id).classList.toggle("open")
}

</script>

</body>
</html>
